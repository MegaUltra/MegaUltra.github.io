<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MegaUltra · DachNima & DachAshkan</title>
  <!-- dark & motion style -->
  <style>
    /* reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      cursor: none;
    }

    body {
      background: #0b0b0b;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Impact', 'Arial Black', sans-serif;
      overflow: hidden;
      color: #e0e0e0;
      user-select: none;
    }

    /* dark glass panel */
    .mega-container {
      position: relative;
      width: 90vw;
      max-width: 1200px;
      padding: 3rem 2rem;
      background: rgba(10, 10, 10, 0.65);
      backdrop-filter: blur(12px) brightness(0.7);
      border: 1px solid rgba(255, 70, 70, 0.25);
      box-shadow: 0 0 60px rgba(200, 0, 0, 0.2), inset 0 0 80px rgba(255, 0, 0, 0.05);
      border-radius: 3.5rem;
      text-align: center;
      transition: box-shadow 0.2s ease;
    }

    /* glitch border effect */
    .mega-container::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 4rem;
      padding: 2px;
      background: radial-gradient(circle at 30% 40%, #ff3b3b, #990000, transparent 80%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0.6;
      pointer-events: none;
    }

    /* TITLE - heavy dark */
    .ultra-title {
      font-size: clamp(3.2rem, 15vw, 7rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #141414;
      text-shadow: 
        0 0 6px #ff2a2a,
        0 0 20px #aa0000,
        0 0 50px #660000,
        4px 4px 0 #1a1a1a,
        -2px -2px 0 #3a3a3a;
      font-family: 'Impact', 'Arial Black', 'Segoe UI Black', sans-serif;
      transform: skewX(-4deg) scaleY(1.1);
      transition: all 0.15s ease;
      margin-bottom: 0.2rem;
      word-break: break-word;
    }

    .ultra-title span {
      display: inline-block;
      animation: flicker 3s infinite alternate;
    }

    @keyframes flicker {
      0% { opacity: 0.95; text-shadow: 0 0 8px #ff3a3a, 0 0 30px #aa0000; }
      100% { opacity: 1; text-shadow: 0 0 15px #ff5e5e, 0 0 60px #cc0000, 0 0 100px #880000; }
    }

    /* owners */
    .owners {
      font-size: clamp(1.4rem, 6vw, 2.8rem);
      font-weight: 600;
      letter-spacing: 0.2em;
      background: linear-gradient(135deg, #b0b0b0, #4a4a4a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(200, 0, 0, 0.6);
      margin-top: -0.4rem;
      margin-bottom: 2.2rem;
      font-family: 'Segoe UI', 'Arial Black', sans-serif;
      transform: scaleX(1.2) scaleY(0.9);
    }

    .owners small {
      font-size: 0.6em;
      background: none;
      -webkit-text-fill-color: #888;
      color: #888;
      text-shadow: 0 0 8px #440000;
    }

    /* update section – ONLY update, no extra files/text */
    .update-zone {
      margin: 2.8rem auto 1rem;
      padding: 0.8rem 1.8rem;
      max-width: 700px;
      border-left: 4px solid #ff2222;
      border-right: 4px solid #ff2222;
      background: rgba(20, 0, 0, 0.4);
      border-radius: 60px;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 40px rgba(255, 0, 0, 0.15);
      display: inline-block;
    }

    .update-label {
      font-size: clamp(0.9rem, 2.5vw, 1.3rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #9e9e9e;
      font-weight: 300;
      border-bottom: 1px dashed #4a4a4a;
      padding-bottom: 0.2rem;
      margin-bottom: 0.2rem;
    }

    .update-content {
      font-size: clamp(1.5rem, 5vw, 2.8rem);
      font-weight: 800;
      color: #ff4d4d;
      text-shadow: 0 0 20px #cc0000, 0 0 50px #880000;
      letter-spacing: 0.1em;
      font-family: 'Impact', 'Arial Black', sans-serif;
      background: linear-gradient(180deg, #ff5555, #aa2222);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      word-break: break-word;
    }

    .update-content small {
      font-size: 0.5em;
      -webkit-text-fill-color: #bbbbbb;
      color: #bbbbbb;
      background: none;
      font-weight: 300;
      letter-spacing: 0.2em;
    }

    /* extra glow for comming soon */
    .coming-glow {
      animation: pulseGlow 1.8s infinite alternate;
    }

    @keyframes pulseGlow {
      0% { text-shadow: 0 0 10px #ff0000, 0 0 30px #990000; }
      100% { text-shadow: 0 0 25px #ff6666, 0 0 70px #ff0000, 0 0 120px #aa0000; }
    }

    /* ghost cursor follower (motion) */
    #cursor-glow {
      position: fixed;
      pointer-events: none;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(255, 30, 30, 0.25) 0%, rgba(200, 0, 0, 0) 70%);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      mix-blend-mode: screen;
      filter: blur(18px);
      transition: width 0.15s ease, height 0.15s ease, background 0.2s;
    }

    #cursor-dot {
      position: fixed;
      pointer-events: none;
      width: 18px;
      height: 18px;
      background: #ff3b3b;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 10000;
      box-shadow: 0 0 40px #ff3b3b, 0 0 100px #cc0000;
      mix-blend-mode: difference;
      transition: width 0.1s, height 0.1s;
    }

    /* secondary motion lines */
    .motion-line {
      position: fixed;
      pointer-events: none;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff4d4d55, transparent);
      z-index: 1;
      opacity: 0;
      transition: opacity 0.2s;
    }

    /* no extra files or text -> just minimal */
    .footer-note {
      margin-top: 2.8rem;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: #353535;
      text-transform: uppercase;
      border-top: 1px solid #222;
      padding-top: 1.5rem;
      width: 60%;
      margin-left: auto;
      margin-right: auto;
      opacity: 0.5;
    }

    /* responsive */
    @media (max-width: 600px) {
      .mega-container {
        padding: 2rem 1rem;
        border-radius: 2.5rem;
      }
      .owners {
        transform: scale(1);
        margin-bottom: 1.2rem;
      }
      .update-zone {
        padding: 0.4rem 1rem;
      }
    }
  </style>
</head>
<body>

  <!-- cursor effects -->
  <div id="cursor-glow"></div>
  <div id="cursor-dot"></div>

  <!-- main card -->
  <div class="mega-container" id="megaCard">
    <h1 class="ultra-title">
      <span>M</span><span>E</span><span>G</span><span>A</span>
      <span>U</span><span>L</span><span>T</span><span>R</span><span>A</span>
    </h1>

    <div class="owners">
      ⚡ DachNima & DachAshkan <small>· founders</small>
    </div>

    <!-- only update section – NO extra files / text -->
    <div class="update-zone">
      <div class="update-label">⬡ update ⬡</div>
      <div class="update-content coming-glow">
        MegaBomb <small>(SmsBomber)</small><br>
        <span style="font-size: 0.6em; letter-spacing: 0.3em; -webkit-text-fill-color: #888; color: #888;">Comming Soon</span>
      </div>
    </div>

    <!-- minimal footer (just aesthetic) -->
    <div class="footer-note">// ultra · dark · motion //</div>
  </div>

  <!-- motion script: mouse tracking + extra motion effects -->
  <script>
    (function(){
      const glow = document.getElementById('cursor-glow');
      const dot = document.getElementById('cursor-dot');
      const card = document.getElementById('megaCard');

      // create motion lines (floating background)
      const linesCount = 12;
      const lines = [];
      for (let i = 0; i < linesCount; i++) {
        const line = document.createElement('div');
        line.className = 'motion-line';
        line.style.top = (i * 8) + '%';
        line.style.left = '-20%';
        line.style.width = '140%';
        line.style.height = (i % 2 === 0) ? '1px' : '3px';
        line.style.background = `linear-gradient(90deg, transparent, rgba(255, ${50 + i * 10}, ${30 + i * 5}, 0.2), transparent)`;
        line.style.filter = 'blur(2px)';
        document.body.appendChild(line);
        lines.push(line);
      }

      // mouse move -> core motion
      document.addEventListener('mousemove', (e) => {
        const x = e.clientX;
        const y = e.clientY;
        
        // move glow & dot
        glow.style.left = x + 'px';
        glow.style.top = y + 'px';
        dot.style.left = x + 'px';
        dot.style.top = y + 'px';

        // dynamic glow size based on movement (random feel)
        const size = 200 + Math.sin(Date.now() * 0.005) * 60;
        glow.style.width = size + 'px';
        glow.style.height = size + 'px';

        // rotate card slightly with mouse (parallax)
        const rect = card.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        const dx = (x - cx) / rect.width;
        const dy = (y - cy) / rect.height;
        const rotX = dy * 3.5;
        const rotY = dx * -3.5;
        card.style.transform = `perspective(800px) rotateX(${rotX}deg) rotateY(${rotY}deg) scale(1.01)`;
        card.style.transition = 'transform 0.08s cubic-bezier(0.2, 0.9, 0.4, 1)';

        // move lines dynamically (motion waves)
        lines.forEach((line, idx) => {
          const offset = (x / window.innerWidth) * 60 + (y / window.innerHeight) * 40;
          const delay = idx * 0.1;
          const shift = (Math.sin(Date.now() * 0.001 + idx + offset) * 25) + 30;
          line.style.transform = `translateX(${shift - 20}px)`;
          line.style.opacity = 0.2 + Math.sin(Date.now() * 0.003 + idx) * 0.1 + 0.1;
        });
      });

      // additional mouse leave (fade)
      document.addEventListener('mouseleave', () => {
        glow.style.opacity = '0.2';
        dot.style.opacity = '0.3';
        card.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) scale(1)';
        card.style.transition = 'transform 0.3s ease';
        lines.forEach(line => {
          line.style.opacity = '0.05';
        });
      });

      document.addEventListener('mouseenter', () => {
        glow.style.opacity = '1';
        dot.style.opacity = '1';
        lines.forEach(line => {
          line.style.opacity = '0.2';
        });
      });

      // initial fake motion to show off
      setTimeout(() => {
        const fakeEvent = new MouseEvent('mousemove', {
          clientX: window.innerWidth * 0.5,
          clientY: window.innerHeight * 0.5,
        });
        document.dispatchEvent(fakeEvent);
      }, 100);

      // random sparkle (extra motion)
      setInterval(() => {
        if (Math.random() > 0.7) {
          glow.style.background = `radial-gradient(circle, rgba(255, ${80 + Math.floor(Math.random()*100)}, 50, 0.4) 0%, rgba(200, 0, 0, 0) 70%)`;
          setTimeout(() => {
            glow.style.background = `radial-gradient(circle, rgba(255, 30, 30, 0.25) 0%, rgba(200, 0, 0, 0) 70%)`;
          }, 200);
        }
      }, 400);

      // (optional) resize recalibration
      window.addEventListener('resize', () => {
        // nothing heavy
      });

      console.log('⚡ MegaUltra · DachNima & DachAshkan ⚡');
      console.log('🔥 MegaBomb (SmsBomber) Comming Soon 🔥');
    })();
  </script>

</body>
</html>
