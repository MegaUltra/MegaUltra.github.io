<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaGroup - Official</title>

<style>

@font-face {
    font-family: "Vazirmatn";
    src: url('https://raw.githubusercontent.com/MegaUltra/MegaUltra.github.io/main/Digi Rastin Bold.ttf') format('truetype');
}

@font-face {
    font-family: "V1";
    src: url('https://raw.githubusercontent.com/MegaUltra/MegaUltra.github.io/main/Vazirmatn-Medium.ttf') format('truetype');
}

html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: Arial, sans-serif;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("44.png") center/cover no-repeat;
    animation: fade 4s ease-in-out infinite;
    z-index: 0;
}

@keyframes fade {
    0%   { opacity: 0.5; }
    50%  { opacity: 1; }
    100% { opacity: 0.5; }
}

.content {
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 1;
}

.title {
    margin: 0;
    color: #a6ffb3;
    font-size: 52px;
    font-weight: bold;
    font-family: "Vazirmatn"

}

.subtitle {
    margin-top: -20px;
    color: rgb(255, 255, 255);
    font-size: 20px;
    font-weight: 400;
    font-family: "V1"
}
</style>

</head>
<body>

<div class="content">
    <h1 class="title">MEGAGROUP - ULTRA EDITION</h1>
    <p class="subtitle">بزرگترین تیم تولید کننده‌‍‌ی نرم افزار</p>
</div>

</body>
</html>
