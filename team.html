<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaGroup - Team</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/MegaUltra/MegaUltra.github.io/main/343434.png">

<style>

@font-face {
    font-family: "Vazirmatn";
    src: url("https://raw.githubusercontent.com/MegaUltra/MegaUltra.github.io/main/Digi Rastin Bold.ttf") format("truetype");
}

@font-face {
    font-family: "V1";
    src: url("https://raw.githubusercontent.com/MegaUltra/MegaUltra.github.io/main/Vazirmatn-Medium.ttf") format("truetype");
}

@font-face {
  font-family: 'ss';
  src: url('https://raw.githubusercontent.com/dachnima/limo.github.io/main/Vazirmatn-Bold.ttf') format('truetype');
}

html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial,sans-serif;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url("https://raw.githubusercontent.com/MegaUltra/MegaUltra.github.io/main/coin.png") center/cover no-repeat;
    animation:fade 4s ease-in-out infinite;
    z-index:0;
}

@keyframes fade{
    0%{opacity:.5;}
    50%{opacity:1;}
    100%{opacity:.5;}
}

/* ================= NAVBAR ================= */

.topbar{
    position:fixed;
    top:50px;
    left:50%;
    transform:translateX(-50%);
    width:900px;
    max-width:calc(100% - 40px);
    height:68px;
    background:rgba(15,15,15,.6);
    backdrop-filter:blur(100000px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:100px;
    display:grid;
    grid-template-columns:1fr auto 1fr;
    align-items:center;
    padding:0 25px;
    box-sizing:border-box;
    z-index:999;
}


.topbar::before{
    content:"";
    position:absolute;
    inset:0;

    background:url("https://raw.githubusercontent.com/MegaUltra/MegaUltra.github.io/main/fadee.png")
               center center / 800px no-repeat;

     opacity: 0.2;
    pointer-events:none;

    mask-image:linear-gradient(to right,
        transparent 0%,
        black 20%,
        black 80%,
        transparent 100%);
    -webkit-mask-image:linear-gradient(to right,
        transparent 0%,
        black 20%,
        black 80%,
        transparent 100%);
}

.logo{
    justify-self:center;
    color:#a6ffb3;
    font-size:25px;
    margin-top: 6px;
    font-family:"Vazirmatn";
    user-select:none;
}

.left-nav{
    justify-self:start;
}

.right-nav{
    justify-self:end;
}

.nav{
    display:flex;
    gap:12px;
}

.nav button{
    border:none;
    background:transparent;
    color:#fff;
    font-family:"V1";
    font-size:15px;
    padding:10px 18px;
    border-radius:10px;
    cursor:pointer;
    transition:.25s;
}

.nav button:hover{
    background:rgba(166,255,179,.12);
    color:#a6ffb3;
    border-radius: 50px;
}

/* ================= CONTENT ================= */

.content{
    position:absolute;
    top:45%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    z-index:1;
}

.title{
    margin:0;
    color:#a6ffb3;
    font-size:52px;
    font-family:"Vazirmatn";
}

.subtitle{
    margin-top:-20px;
    color:#fff;
    font-size:20px;
    font-family:"V1";
}

.cards{
    margin-top:45px;
    display:flex;
    justify-content:center;
    gap:22px;
    flex-wrap:wrap;
}

.card{
    width:250px;
    min-height:180px;
    background:rgba(15,15,15,.55);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:18px;
    padding:25px;
    box-sizing:border-box;
    transition:.3s;
    cursor:pointer;
}



.card:hover{
    transform:translateY(-2px);
    border-color:rgba(166,255,179,.4);
}

.card h3{
    margin:0 0 15px;
    color:#a6ffb3;
    font-family:"Vazirmatn";
    font-size:22px;
    margin-top: -1px;
}

.card p{
    margin:0;
    color:#ddd;
    font-family:"V1";
    line-height:1.8;
    font-size:14px;
    margin-top: -20px;
}

.card{
    display:flex;
    flex-direction:column;
}

.card p{
    flex:1;
}


.profile{
    width:80px;
    height:80px;
    border-radius:50%;
    object-fit:cover;
    margin:0 auto 18px;
    display:block;
    border:0.5px solid #c8ffd0;
    box-shadow:0 0 20px #c8ffd05b;
}

.badge{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    margin:18px auto 0;
    padding:8px 18px;
    background:rgba(166, 255, 179, 0.192);
    border:1px solid rgba(166,255,179,.35);
    border-radius:999px;
    color:#a6ffb3;
    font-family:"V1";
    height: 5px;
    margin-top: 4px;
    font-size:12px;

}

</style>
</head>

<body>

<!-- Navbar -->
<div class="topbar">

<div class="nav left-nav">
<button onclick="window.location.href='https://megaultra.github.io/'">Home</button>
    </button>

<button onclick="window.location.href='https://megaultra.github.io/team.html'">Team</button>
    
</div>

    <div class="logo">
        MegaGroup
    </div>

    <div class="nav right-nav">
        <button>Team</button>
        <button>Contact</button>
    </div>

</div>

<!-- Main Content -->
<div class="content">

    <h1 class="title">MEGAGROUP - TEAM</h1>

    <p class="subtitle">
       !این تیم یکی از بهترین تیم های دنیاست
    </p>


    <div class="cards">

        <!-- Card 1 -->
<div class="card">

    <img class="profile"
         src="https://YOUR-IMAGE-LINK-1.png"
         alt="DachNima">

    <h3>DachNima</h3>

    <p>
        Founder Of MegaGroup
    </p>

    <div class="badge">FOUNDER</div>

</div>

        <!-- Card 2 -->
<div class="card">

    <img class="profile"
         src="https://YOUR-IMAGE-LINK-2.png"
         alt="DachAshkan">

    <h3>DachAshkan</h3>

    <p>
        Founder Of MegaGroup
    </p>

    <div class="badge">FOUNDER</div>

</div>

        <!-- Card 3 -->


</body>
